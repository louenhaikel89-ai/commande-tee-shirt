<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Commande Tee-shirt</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;display:flex;justify-content:center;align-items:center;height:100vh;}
.card{background:white;padding:30px;border-radius:20px;width:300px;text-align:center;}
input{width:90%;padding:10px;margin:10px 0;}
button{padding:12px;width:100%;background:black;color:white;border:none;}
.size-btn{border:1px solid black;padding:10px;margin:5px;cursor:pointer;}
.active{background:black;color:white;}
</style>
</head>

<body>

<div class="card">

<h2>Commande Tee-shirt</h2>

<form id="form">

<input type="text" name="nom" placeholder="Nom" required>
<input type="text" name="prenom" placeholder="Prénom" required>

<input type="number" id="quantite" value="1" min="1">

<div id="total">Total : 14,90€</div>

<div>
<div class="size-btn" data-size="S">S</div>
<div class="size-btn" data-size="M">M</div>
<div class="size-btn" data-size="L">L</div>
</div>

<input type="hidden" id="taille">

<button type="submit">Commander</button>

</form>

</div>

<script>

const prix = 14.90;
const quantiteInput = document.getElementById("quantite");
const totalDisplay = document.getElementById("total");
const tailleInput = document.getElementById("taille");

/* Prix dynamique */
quantiteInput.addEventListener("input", ()=>{
let q = quantiteInput.value;
let total = q * prix;
totalDisplay.innerText = "Total : " + total.toFixed(2).replace(".", ",") + "€";
});

/* Tailles */
document.querySelectorAll(".size-btn").forEach(btn=>{
btn.onclick = ()=>{
document.querySelectorAll(".size-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
tailleInput.value = btn.dataset.size;
};
});

/* Redirection simple */
document.getElementById("form").onsubmit = function(e){
e.preventDefault();

if(!tailleInput.value){
alert("Choisis une taille");
return;
}

/* REDIRECTION DIRECTE */
window.location.href = "confirmation.html";
};

</script>

</body>
</html>
