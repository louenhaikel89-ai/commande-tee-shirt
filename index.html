<script>

/* EmailJS */
(function(){
emailjs.init("kDo3uvb5PTqrYJUHt");
})();

/* Variables */
const prix = 14.90;
const form = document.getElementById("orderForm");
const quantiteInput = document.getElementById("quantite");
const totalDisplay = document.getElementById("totalPrice");
const tailleInput = document.getElementById("taille");

/* Calcul du total */
function updateTotal(){
let quantite = parseInt(quantiteInput.value) || 1;
let total = quantite * prix;

totalDisplay.innerText = "Total : " + total.toFixed(2).replace(".", ",") + "€";
}

quantiteInput.addEventListener("input", updateTotal);

/* Gestion tailles */
document.querySelectorAll(".size-btn").forEach(btn=>{
btn.addEventListener("click",function(){

document.querySelectorAll(".size-btn").forEach(b=>b.classList.remove("active"));

this.classList.add("active");
tailleInput.value = this.dataset.size;

});
});

/* Envoi formulaire */
form.addEventListener("submit", function(e){

e.preventDefault();

/* Vérification taille */
if(!tailleInput.value){
alert("Merci de sélectionner une taille");
return;
}

/* Récupération données */
let nom = form.nom.value;
let prenom = form.prenom.value;
let email = form.email.value;
let telephone = form.telephone.value;
let quantite = quantiteInput.value;
let total = (quantite * prix).toFixed(2).replace(".", ",");

/* EmailJS */
let formData = {
nom: nom,
prenom: prenom,
email: email,
telephone: telephone,
taille: tailleInput.value,
quantite: quantite,
total: total + "€"
};

emailjs.send("service_uztjipa","template_7pq5h6z",formData)

.then(() => {

/* Redirection */
window.location.href =
"./confirmation.html?total=" + encodeURIComponent(total) +
"&nom=" + encodeURIComponent(nom) +
"&prenom=" + encodeURIComponent(prenom) +
"&taille=" + encodeURIComponent(tailleInput.value) +
"&quantite=" + encodeURIComponent(quantite);

})

.catch(error => {
alert("Erreur : " + JSON.stringify(error));
});

});

</script>
