<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Commande confirmée</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:400px;
width:90%;
animation:fadeIn 0.6s ease;
}

.check{
font-size:50px;
margin-bottom:15px;
}

h1{
margin-bottom:15px;
font-size:26px;
}

p{
color:#555;
font-size:16px;
margin-bottom:30px;
line-height:1.5;
}

button{
background:black;
color:white;
border:none;
padding:14px 28px;
border-radius:12px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
background:#333;
transform:scale(1.05);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media (max-width:480px){

.card{
padding:25px;
}

h1{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="card">

<div class="check">✅</div>

<h1>Commande confirmée</h1>

<p>
Merci pour ton achat 👕<br><br>
Ta commande a bien été enregistrée.<br>
Le règlement se fera directement à <strong>la vie scolaire</strong>.
</p>

<a href="index.html">
<button>Retour au site</button>
</a>

</div>

</body>
</html>
