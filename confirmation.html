<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Commande confirmée</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  text-align: center;
}

.card{
  background: white;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  max-width: 400px;
}

h1{
  margin-bottom: 20px;
}

p{
  color: #555;
  font-size: 16px;
  margin-bottom: 30px;
}

button{
  background: black;
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

button:hover{
  background: #333;
}
</style>
</head>

<body>

<div class="card">

<h1>Commande confirmée 🎉</h1>

<p>
Merci pour ton achat.<br>
La vie scolaire t'attend pour le règlement.
</p>

<a href="index.html">
<button>Retour</button>
</a>

</div>

</body>
</html>
