<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Commande confirmée</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:400px;
width:90%;
animation:fadeIn 0.6s ease;
}

.check{
font-size:50px;
margin-bottom:15px;
}

h1{
margin-bottom:10px;
font-size:26px;
}

.total{
font-size:22px;
font-weight:bold;
margin:15px 0;
color:#111;
}

.resume{
background:#f9f9f9;
border-radius:10px;
padding:15px;
margin-bottom:20px;
text-align:left;
font-size:14px;
color:#333;
}

.resume p{
margin:5px 0;
}

.info{
color:#555;
font-size:15px;
margin-bottom:25px;
line-height:1.5;
}

button{
background:black;
color:white;
border:none;
padding:14px 28px;
border-radius:12px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
background:#333;
transform:scale(1.05);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="card">

<div class="check">✅</div>

<h1>Commande confirmée</h1>

<div class="total" id="totalDisplay">Total : -- €</div>

<div class="resume">
<p><strong>Nom :</strong> <span id="nom"></span></p>
<p><strong>Prénom :</strong> <span id="prenom"></span></p>
<p><strong>Taille :</strong> <span id="taille"></span></p>
<p><strong>Quantité :</strong> <span id="quantite"></span></p>
</div>

<div class="info">
Merci pour ton achat 👕<br><br>
Ta commande a bien été enregistrée.<br><br>

💸 Le règlement s’effectuera à la <strong>vie scolaire</strong><br>
Modes de paiement acceptés :<br>
💵 Espèces<br>
🧾 Chèque
</div>

<button onclick="window.location.href='index.html'">
Retour au site
</button>

</div>

<script>

/* Récupération des données URL */

const params = new URLSearchParams(window.location.search);

const total = params.get("total");
const nom = params.get("nom");
const prenom = params.get("prenom");
const taille = params.get("taille");
const quantite = params.get("quantite");

/* Affichage */

if(total){
document.getElementById("totalDisplay").innerText = "Total : " + total + "€";
}

if(nom) document.getElementById("nom").innerText = nom;
if(prenom) document.getElementById("prenom").innerText = prenom;
if(taille) document.getElementById("taille").innerText = taille;
if(quantite) document.getElementById("quantite").innerText = quantite;

</script>

</body>
</html>
