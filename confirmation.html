<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Commande confirmée</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, sans-serif;
}

body{
background: linear-gradient(135deg, #f5f5f5, #eaeaea);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:400px;
width:90%;
animation:fadeIn 0.6s ease;
}

.icon{
font-size:60px;
margin-bottom:15px;
}

h1{
font-size:26px;
margin-bottom:10px;
}

.subtitle{
color:#555;
margin-bottom:20px;
font-size:15px;
}

.info{
background:#f9f9f9;
padding:15px;
border-radius:12px;
margin-bottom:25px;
font-size:14px;
color:#333;
line-height:1.5;
}

.payment{
font-size:15px;
color:#444;
margin-bottom:25px;
}

button{
background:black;
color:white;
border:none;
padding:14px 25px;
border-radius:12px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
background:#333;
transform:scale(1.05);
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="card">

<div class="icon">🎉</div>

<h1>Commande confirmée</h1>

<div class="subtitle">
Merci pour ta commande 👕
</div>

<div class="info">
Ta demande a bien été enregistrée.<br>
Nous avons reçu toutes tes informations.
</div>

<div class="payment">
💸 Le paiement s’effectuera à la <strong>vie scolaire</strong><br><br>
Modes acceptés :<br>
💵 Espèces<br>
🧾 Chèque
</div>

<button onclick="window.location.href='index.html'">
Retour
</button>

</div>

</body>
</html>
